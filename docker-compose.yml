services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: smartagro-app:latest
    container_name: smartagro-app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      SEED_DATABASE: ${SEED_DATABASE:-false}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    volumes:
      - ./:/var/www/html
      - app-storage:/var/www/html/storage
      - sqlite-data:/var/www/html/database
    networks:
      - smartagro

  web:
    image: nginx:1.27-alpine
    container_name: smartagro-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - smartagro

  # Optional: enable MySQL by uncommenting and setting DB_CONNECTION=mysql in .env
  # mysql:
  #   image: mysql:8.4
  #   container_name: smartagro-mysql
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_DATABASE: ${DB_DATABASE:-smartagro}
  #     MYSQL_USER: ${DB_USERNAME:-smartagro}
  #     MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
  #     MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
  #   volumes:
  #     - mysql-data:/var/lib/mysql
  #   ports:
  #     - "${DB_PORT:-3306}:3306"
  #   networks:
  #     - smartagro

volumes:
  app-storage:
  sqlite-data:
  # mysql-data:

networks:
  smartagro:
    driver: bridge
